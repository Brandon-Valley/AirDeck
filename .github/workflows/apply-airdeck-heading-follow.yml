name: Force and verify AirDeck stable heading Pages

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/apply-airdeck-heading-follow.yml

permissions:
  contents: write
  pages: write

concurrency:
  group: force-airdeck-stable-heading-pages
  cancel-in-progress: true

jobs:
  deploy-and-verify:
    if: github.event.head_commit.message == 'Force AirDeck stable heading Pages rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Confirm master contains the fixed build
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'airdeck-build" content="2026-07-04-stable-heading-lock"' index.html
          grep -q 'function unwrapHeading' index.html
          test "$(wc -c < index.html)" -gt 80000

      - name: Request a GitHub Pages rebuild
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.repos.requestPagesBuild({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              core.info('Requested a Pages rebuild from the configured master source.');
            } catch (error) {
              core.warning(`Pages rebuild request returned ${error.status || 'an error'}; continuing to live verification.`);
            }

      - name: Wait for the main GitHub Pages URL
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 90); do
            page="$(curl --fail --silent --show-error --location --max-time 25 \
              -H 'Cache-Control: no-cache' \
              "https://brandon-valley.github.io/AirDeck/?stable-heading=${GITHUB_RUN_ID}-${attempt}" || true)"
            bytes="$(echo -n "$page" | wc -c)"
            if echo "$page" | grep -q 'airdeck-build" content="2026-07-04-stable-heading-lock"' \
              && [ "$bytes" -gt 80000 ]; then
              echo "Verified live AirDeck on attempt $attempt: $bytes bytes."
              exit 0
            fi
            sleep 10
          done
          echo "The stable-heading build did not appear on the main Pages URL in time." >&2
          exit 1

      - name: Record successful Pages verification
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = 'deployment-verification.json';
            const branch = 'master';
            let existingSha;
            try {
              const current = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
              existingSha = current.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            const payload = {
              verified_build: '2026-07-04-stable-heading-lock',
              verified_url: 'https://brandon-valley.github.io/AirDeck/',
              verified_at: new Date().toISOString(),
              verification: 'main Pages URL returned the complete standalone index with the expected build marker'
            };
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch,
              message: 'Record verified AirDeck stable heading deployment',
              content: Buffer.from(JSON.stringify(payload, null, 2) + '\n').toString('base64'),
              ...(existingSha ? { sha: existingSha } : {})
            });
