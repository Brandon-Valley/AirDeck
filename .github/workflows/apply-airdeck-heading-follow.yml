      - name: Validate module JavaScript
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text()
          scripts = re.findall(r'<script type="module">(.*?)</script>', text, re.S)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one module script, found {len(scripts)}')
          Path('/tmp/airdeck.mjs').write_text(scripts[0])
          PY
          node --check /tmp/airdeck.mjs

      - name: Commit index.html directly to master
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Make AirDeck heading follow the user until launch"
          git push origin master

      - name: Wait for the main GitHub Pages URL
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            page="$(curl --fail --silent --show-error --location --max-time 25 \
              -H 'Cache-Control: no-cache' \
              "https://brandon-valley.github.io/AirDeck/?heading-follow=${GITHUB_RUN_ID}-${attempt}" || true)"
            bytes="$(echo -n "$page" | wc -c)"
            if echo "$page" | grep -q 'airdeck-build" content="2026-07-04-heading-follow-lock"' \
              && [ "$bytes" -gt 80000 ]; then
              echo "$page" > /tmp/live-index.html
              echo "Verified live AirDeck on attempt $attempt: $bytes bytes."
              exit 0
            fi
            sleep 10
          done
          echo "The new AirDeck build did not appear on the main Pages URL in time." >&2
          exit 1

      - name: Record successful Pages verification
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json
          payload = {
              "verified_build": "2026-07-04-heading-follow-lock",
              "verified_url": "https://brandon-valley.github.io/AirDeck/",
              "verification": "main Pages URL returned the complete standalone index with the expected build marker"
          }
          Path('deployment-verification.json').write_text(json.dumps(payload, indent=2) + '\n')
          PY
          git add deployment-verification.json
          git commit -m "Record verified AirDeck heading follow deployment"
          git push origin master
