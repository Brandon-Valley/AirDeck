name: Apply and verify AirDeck heading follow

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/apply-airdeck-heading-follow.yml

permissions:
  contents: write

concurrency:
  group: apply-airdeck-heading-follow
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.head_commit.message == 'Install AirDeck heading follow patch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

