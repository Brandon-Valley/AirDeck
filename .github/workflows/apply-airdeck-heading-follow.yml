name: Apply and verify AirDeck fullscreen launch

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/apply-airdeck-heading-follow.yml
      - fullscreen-trigger.txt

permissions:
  contents: write
  pages: write

concurrency:
  group: apply-airdeck-fullscreen-launch
  cancel-in-progress: true

jobs:
  apply-and-verify:
    if: github.event.head_commit.message == 'Trigger AirDeck fullscreen launch patch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch index.html
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text()

          def replace_once(old, new, label):
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              text = text.replace(old, new, 1)

          replace_once('2026-07-04-tilt-stable-heading', '2026-07-04-fullscreen-launch', 'build marker')
          replace_once(
              '<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />',
              '<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />\n<meta name="mobile-web-app-capable" content="yes" />\n<meta name="apple-mobile-web-app-capable" content="yes" />\n<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />',
              'mobile viewport metadata',
          )
          replace_once(
              'html,body{height:100%;height:100dvh;margin:0;background:var(--ink);color:var(--white);font-family:"Space Grotesk",system-ui,sans-serif;overflow:hidden}',
              'html,body{width:100%;height:100%;height:100dvh;margin:0;background:var(--ink);color:var(--white);font-family:"Space Grotesk",system-ui,sans-serif;overflow:hidden;overscroll-behavior:none;touch-action:none}\n  body{position:fixed;inset:0;width:100%;min-height:100%;min-height:100dvh}',
              'fixed fullscreen viewport css',
          )
          replace_once(
              '  .app{height:100%;height:100dvh;display:flex;flex-direction:column;position:relative;background:',
              '  .app{width:100%;height:100%;height:100dvh;display:flex;flex-direction:column;position:relative;background:',
              'app fullscreen width',
          )

          fullscreen = r'''
          /* Fullscreen */
          let fullscreenPending=false;
          async function enterAppFullscreen(){
            if(document.fullscreenElement||document.webkitFullscreenElement)return true;
            if(fullscreenPending)return false;
            const el=document.documentElement;
            const request=el.requestFullscreen?.bind(el)||el.webkitRequestFullscreen?.bind(el);
            if(!request)return false;
            fullscreenPending=true;
            try{
              const result=el.requestFullscreen?request({navigationUI:'hide'}):request();
              if(result&&typeof result.then==='function')await result;
              return true;
            }catch(_){
              return false;
            }finally{
              fullscreenPending=false;
              resize3D();
            }
          }
          function requestFullscreenFromGesture(){
            enterAppFullscreen().then(ok=>{
              if(ok){
                document.removeEventListener('pointerdown',requestFullscreenFromGesture,true);
                document.removeEventListener('click',requestFullscreenFromGesture,true);
              }
            });
          }
          document.addEventListener('pointerdown',requestFullscreenFromGesture,true);
          document.addEventListener('click',requestFullscreenFromGesture,true);
          document.addEventListener('fullscreenchange',resize3D,{passive:true});
          document.addEventListener('webkitfullscreenchange',resize3D,{passive:true});

          '''
          replace_once(
              '/* UI events */\nbuildModes();buildSimulator();init3D();setDisplayModel(displayModel);',
              fullscreen + '/* UI events */\nbuildModes();buildSimulator();init3D();setDisplayModel(displayModel);',
              'fullscreen functions',
          )
          replace_once(
              "$('#safetyAccept').onclick=()=>{$('#safetyOverlay').classList.remove('show');beep(260,.05,'square');};",
              "$('#safetyAccept').onclick=()=>{enterAppFullscreen();$('#safetyOverlay').classList.remove('show');beep(260,.05,'square');};",
              'fullscreen entry button',
          )

          path.write_text(text)
          PY
          grep -q 'airdeck-build" content="2026-07-04-fullscreen-launch"' index.html
          grep -q 'requestFullscreen({navigationUI:' index.html
          grep -q 'mobile-web-app-capable' index.html
          test "$(wc -c < index.html)" -gt 80000

      - name: Validate module JavaScript
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text()
          scripts = re.findall(r'<script type="module">(.*?)</script>', text, re.S)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one module script, found {len(scripts)}')
          Path('/tmp/airdeck.mjs').write_text(scripts[0])
          PY
          node --check /tmp/airdeck.mjs

      - name: Commit index.html to master
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Open AirDeck in fullscreen on first tap"
          git push origin master

      - name: Rebuild and verify GitHub Pages
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'master';
            const expected = '2026-07-04-fullscreen-launch';
            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

            try {
              await github.rest.repos.requestPagesBuild({ owner, repo });
            } catch (error) {
              core.warning(`Pages rebuild request returned ${error.status || 'an error'}; continuing to verification.`);
            }

            let verified = false;
            let bytes = 0;
            let latestBuild = null;
            for (let attempt = 1; attempt <= 90; attempt++) {
              try {
                latestBuild = (await github.rest.repos.getLatestPagesBuild({ owner, repo })).data;
              } catch (error) {
                latestBuild = { error_status: error.status, error_message: error.message };
              }
              try {
                const response = await fetch(`https://brandon-valley.github.io/AirDeck/?fullscreen=${context.runId}-${attempt}`, {
                  headers: { 'cache-control': 'no-cache' },
                  redirect: 'follow'
                });
                const html = await response.text();
                bytes = html.length;
                if (response.ok && bytes > 80000 && html.includes(`airdeck-build\" content=\"${expected}`)) {
                  verified = true;
                  break;
                }
              } catch (error) {
                core.info(`Attempt ${attempt}: ${error.message}`);
              }
              await sleep(10000);
            }
            if (!verified) {
              core.setFailed('The fullscreen build did not appear on the main Pages URL in time.');
              return;
            }

            let sha;
            try {
              sha = (await github.rest.repos.getContent({ owner, repo, path: 'deployment-verification.json', ref: branch })).data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            const payload = {
              verified_build: expected,
              verified_url: 'https://brandon-valley.github.io/AirDeck/',
              verified_at: new Date().toISOString(),
              live_bytes: bytes,
              latest_pages_build: latestBuild,
              verification: 'main Pages URL returned the complete standalone index with the expected fullscreen build marker'
            };
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: 'deployment-verification.json',
              branch,
              message: 'Record verified AirDeck fullscreen deployment',
              content: Buffer.from(JSON.stringify(payload, null, 2) + '\n').toString('base64'),
              ...(sha ? { sha } : {})
            });
