name: Materialize standalone AirDeck

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/materialize-airdeck.yml

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.head_commit.message == 'Install standalone AirDeck materializer'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild standalone index.html
        shell: bash
        run: |
          set -euo pipefail
          cat assets/airdeck-throw-state-1.txt assets/airdeck-throw-state-2.txt \
            | tr -d '\r\n' \
            | base64 --decode \
            | gzip --decompress \
            > index.html

          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text()
          old = '<meta name="airdeck-build" content="2026-07-04-throw-state-machine" />'
          new = '<meta name="airdeck-build" content="2026-07-04-throw-state-machine-standalone" />'
          if old not in text:
              raise SystemExit('Expected build marker was not found')
          path.write_text(text.replace(old, new, 1))
          PY

          grep -q '2026-07-04-throw-state-machine-standalone' index.html
          grep -q 'AIR DECK' index.html
          test "$(wc -c < index.html)" -gt 80000

      - name: Validate module JavaScript
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text()
          scripts = re.findall(r'<script type="module">(.*?)</script>', text, re.S)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one module script, found {len(scripts)}')
          Path('/tmp/airdeck.mjs').write_text(scripts[0])
          PY
          node --check /tmp/airdeck.mjs

      - name: Commit standalone app
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Embed standalone AirDeck app and remove loader fetches"
          git push origin master
