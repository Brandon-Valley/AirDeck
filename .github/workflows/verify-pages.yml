name: Build and verify GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - index.html
      - assets/airdeck-throw-state-1.txt
      - assets/airdeck-throw-state-2.txt
      - .github/workflows/verify-pages.yml

permissions:
  contents: write

concurrency:
  group: build-and-verify-airdeck
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Materialize complete standalone index.html
        shell: bash
        run: |
          set -euo pipefail
          build='2026-07-04-throw-catch-state-machine'

          if grep -q "airdeck-build\" content=\"${build}" index.html \
            && [ "$(wc -c < index.html)" -gt 80000 ]; then
            echo "Standalone app is already materialized."
            exit 0
          fi

          cat assets/airdeck-throw-state-1.txt assets/airdeck-throw-state-2.txt \
            | tr -d '\r\n' \
            | base64 --decode \
            | gzip --decompress \
            > /tmp/airdeck-index.html

          grep -q "airdeck-build\" content=\"${build}" /tmp/airdeck-index.html
          test "$(wc -c < /tmp/airdeck-index.html)" -gt 80000
          mv /tmp/airdeck-index.html index.html

      - name: Validate JavaScript
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text()
          scripts = re.findall(r'<script type="module">(.*?)</script>', text, re.S)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one module script, found {len(scripts)}')
          Path('/tmp/airdeck.mjs').write_text(scripts[0])
          PY
          node --check /tmp/airdeck.mjs

      - name: Commit materialized app when needed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- index.html; then
            echo "No index.html change to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Deploy stricter AirDeck throw and catch detector"
            git push origin master
          fi

      - name: Wait for updated app on GitHub Pages
        shell: bash
        run: |
          set -euo pipefail
          build='2026-07-04-throw-catch-state-machine'
          for attempt in $(seq 1 60); do
            page="$(curl --fail --silent --show-error --location --max-time 20 \
              -H 'Cache-Control: no-cache' \
              "https://brandon-valley.github.io/AirDeck/?deploy=${GITHUB_RUN_ID}-${attempt}" || true)"
            bytes="$(printf '%s' "$page" | wc -c)"
            if printf '%s' "$page" | grep -q "airdeck-build\" content=\"${build}" \
              && [ "$bytes" -gt 80000 ]; then
              echo "Verified AirDeck on attempt ${attempt}: ${bytes} bytes."
              exit 0
            fi
            sleep 10
          done
          echo "Updated AirDeck did not appear on GitHub Pages in time." >&2
          exit 1

      - name: Record successful verification
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = 'deployment-verification.json';
            const branch = 'master';
            let existingSha;
            try {
              const current = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
              existingSha = current.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            const payload = {
              verified_commit: context.sha,
              verified_build: '2026-07-04-throw-catch-state-machine',
              verified_url: 'https://brandon-valley.github.io/AirDeck/',
              verified_at: new Date().toISOString()
            };
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch,
              message: 'Record verified AirDeck Pages deployment',
              content: Buffer.from(JSON.stringify(payload, null, 2) + '\n').toString('base64'),
              ...(existingSha ? { sha: existingSha } : {})
            });
