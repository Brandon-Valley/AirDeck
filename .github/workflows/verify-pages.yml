name: Verify AirDeck GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - index.html
      - independent-replay-verify-trigger.txt
      - .github/workflows/verify-pages.yml

permissions:
  contents: write
  pages: write

concurrency:
  group: verify-airdeck-embedded-replay
  cancel-in-progress: true

jobs:
  verify-pages:
    if: github.event.head_commit.message != 'Record verified AirDeck embedded replay deployment'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate embedded build
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'airdeck-build" content="2026-07-06-embedded-independent-replay"' index.html
          grep -q 'Embedded AirDeck data was damaged' index.html
          test "$(wc -c < index.html)" -gt 30000

      - name: Request Pages rebuild
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.repos.requestPagesBuild({ owner: context.repo.owner, repo: context.repo.repo });
            } catch (error) {
              core.warning(`Pages rebuild request returned ${error.status || 'an error'}; continuing to verification.`);
            }

      - name: Wait for embedded build on main Pages URL
        shell: bash
        run: |
          set -euo pipefail
          expected='2026-07-06-embedded-independent-replay'
          for attempt in $(seq 1 90); do
            page="$(curl --fail --silent --show-error --location --max-time 25 \
              -H 'Cache-Control: no-cache' \
              "https://brandon-valley.github.io/AirDeck/?embedded-replay=${GITHUB_RUN_ID}-${attempt}" || true)"
            bytes="$(printf '%s' "$page" | wc -c)"
            if printf '%s' "$page" | grep -q "airdeck-build\" content=\"${expected}" \
              && [ "$bytes" -gt 30000 ]; then
              echo "Verified AirDeck embedded replay build on attempt ${attempt}: ${bytes} bytes."
              exit 0
            fi
            sleep 10
          done
          echo "The embedded-replay build did not appear on the main Pages URL in time." >&2
          exit 1

      - name: Record successful verification
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = 'deployment-verification.json';
            const branch = 'master';
            let sha;
            try {
              sha = (await github.rest.repos.getContent({ owner, repo, path, ref: branch })).data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            const payload = {
              verified_build: '2026-07-06-embedded-independent-replay',
              verified_url: 'https://brandon-valley.github.io/AirDeck/',
              verified_at: new Date().toISOString(),
              verification: 'main Pages URL returned the self-contained embedded replay build marker'
            };
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch,
              message: 'Record verified AirDeck embedded replay deployment',
              content: Buffer.from(JSON.stringify(payload, null, 2) + '\n').toString('base64'),
              ...(sha ? { sha } : {})
            });
