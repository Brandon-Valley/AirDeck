<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0a0a0d">
<meta name="airdeck-loader-build" content="2026-07-04-jekyll-embedded-payload">
<title>AIR DECK '99</title>
<style>
html,body{margin:0;height:100%;background:#09090c;color:#fff;font-family:system-ui,sans-serif}
body{display:grid;place-items:center}
#boot{font-weight:900;letter-spacing:.12em;text-align:center;padding:24px;line-height:1.5}
#boot small{display:block;color:#a9a7b1;margin-top:12px;font-weight:500;letter-spacing:.04em}
</style>
</head>
<body>
<div id="boot">AIR DECK '99<br>LOADING...<small id="status">Opening the complete app</small></div>
<script>
(async()=>{
  try{
    const encoded=`{% include_relative assets/airdeck-throw-state-1.txt %}{% include_relative assets/airdeck-throw-state-2.txt %}`.replace(/\s+/g,'');
    if(encoded.length<50000) throw new Error('Embedded game data was incomplete.');
    const binary=atob(encoded);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    if(typeof DecompressionStream!=='function') throw new Error('Update Chrome to open this version of AirDeck.');
    document.getElementById('status').textContent='Starting AirDeck';
    const html=await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).text();
    if(!html.includes('AIR DECK')) throw new Error('Embedded game data was invalid.');
    document.open();
    document.write(html);
    document.close();
  }catch(error){
    document.body.innerHTML=`<div id="boot"><b>AIR DECK FAILED TO LOAD</b><br><br>${String(error.message||error)}<br><br><small>This build no longer downloads game payloads. Reload once after GitHub Pages finishes updating.</small></div>`;
  }
})();
</script>
</body>
</html>
